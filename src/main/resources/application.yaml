server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    # 兜底放大 application/json 请求体的可消费字节数，避免前端把大字段（如 dataURL）整体 POST 时被 Tomcat 直接断连
    max-swallow-size: 20MB
    max-http-form-post-size: 20MB

spring:
  application:
    name: smart-teach-platform
  profiles:
    active: dev
  # Disable Springfox / knife4j (Springfox 2.10.5 NPEs on JDK 21)

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/smart_teach_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: nidexinmima

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.smartteach.modules.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

# 自定义配置：JWT
jwt:
  secret: SmartTeachPlatformSecretKey20240101ShouldBeChangedInProd
  # token 有效期（毫秒），默认 12 小时
  expire: 43200000
  header: Authorization
  token-prefix: "Bearer "

# 文件存储后端（资源管理模块使用）
#   storage-type = local  -> 写入 upload-path 本地磁盘，由 access-prefix 暴露（默认）
#   storage-type = oss    -> 走 Aliyun OSS，启用 oss.* 配置
#   storage-type = minio  -> 走 S3 兼容（MinIO / Ceph RGW / AWS S3），启用 minio.* 配置
file:
  storage-type: local
  # Absolute path; ${user.home}/uploads/ also works if your IDE sets user.home properly.
  # See FileStorageAutoConfig / LocalFileStorage for path resolution.
  upload-path: D:/data/smart-teach-platform/uploads/
  access-prefix: /api/files/

  # 阿里云 OSS（storage-type=oss 时生效）
  #   endpoint 示例: https://oss-cn-hangzhou.aliyuncs.com
  #   bucket 必须允许公共读（或配置 cdn-domain 由 CDN 提供回源）
  #   cdn-domain 可选：若设置，访问 URL 走 {cdnDomain}/{key}，否则 {endpoint}/{bucket}/{key}
  oss:
    endpoint: 
    bucket: 
    access-key-id: 
    access-key-secret: 
    cdn-domain: 

  # MinIO / 其他 S3 兼容服务（storage-type=minio 时生效）
  #   public-base-url 可选：在反向代理 / CDN 后面时，指定对外访问用的 scheme+host
  minio:
    endpoint: 
    bucket: 
    access-key: 
    secret-key: 
    public-base-url: 
init:
  password-reset:
    enabled: true
    token: smartteach-init-2024

# knife4j 接口文档
knife4j:
  enable: false
  openapi:
    title: 智能化在线教学支持服务平台管理中心系统接口文档
    version: 1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.smartteach.modules

# Disable springfox (which is what knife4j wraps). Springfox 2.10.5 is incompatible with
# JDK 21 / Spring 5.3 and can throw NPE during startup. We don't need the swagger UI anyway.
springfox:
  enabled: false
  docket:
    enabled: false