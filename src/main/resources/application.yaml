server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    # 兜底放大 application/json 请求体的可消费字节数，避免前端把大字段（如 dataURL）整体 POST 时被 Tomcat 直接断连
    max-swallow-size: 20MB
    max-http-form-post-size: 20MB

spring:
  application:
    name: smart-teach-platform
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/smart_teach_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.smartteach.modules.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

# 自定义配置：JWT
jwt:
  secret: SmartTeachPlatformSecretKey20240101ShouldBeChangedInProd
  header: Authorization
  token-prefix: "Bearer "

# 文件上传路径（资源管理模块使用）
# 默认保存到当前用户目录下，跨 Windows/Linux 平台。如需自定义请改为绝对路径并确保进程有读写权限。
file:
  upload-path: ${user.home}/smart-teach-uploads/
  access-prefix: /api/files/

# AI 解题（本地 Ollama，提供给前台 web-portal 的 aiassistant 模块使用）
aiassistant:
  ollama:
    base-url: http://localhost:11434   # Ollama 本地默认监听
    model: gemma3:1b                   # 1B 参数小模型，本地 8GB 内存即可跑
    timeout: 60s                        # 单次问答最大等待；gemma3:1b CPU 上通常 < 30s
    connect-timeout: 60s                 # 连接超时
    stream-concurrency: 2               # 同时在飞的最大请求数（Semaphore 限流）
    # 系统提示词：让 gemma3:1b 扮演「解题助教」（分步骤、重推导、不替学生做作业）。
    # 直接在 application.yaml 改即可热生效；太长会拖慢推理，建议 ≤ 600 字。
    system-prompt: |
      你是「AI 解题助手」，面向高校本科生的学习辅助角色。
      【任务】帮助学生理解问题、引导思路，而不是直接给出最终答案。
      【风格】
      1. 先用 1-2 句话概述思路，再按编号步骤展开；
      2. 涉及代码时，给出最小可运行片段（带必要注释），并配 1-2 行关键解释；
      3. 涉及数学/证明时，明确每一步依据（公式 / 定理 / 定义）；
      4. 输出语言跟随提问语言（中文提问用中文回答，英文提问用英文回答）；
      5. 内容尽量准确；不确定时直接说明「我不确定」，绝不编造；
      6. 末尾用 1-3 条「关键点」总结要点，不要写大段结语；
      7. 单次回答不超过 600 字，除非用户明确要求更详细。
      【底线】你只是辅助，学生必须独立完成作业与考试。
    # 上下文记忆：同一会话内最多保留最近 8 轮问答（user/assistant 各一条算 1 轮）
    # 单条消息最多 800 字；超出按时间倒序截断
    history-max-turns: 8
    history-per-message-chars: 800
  history:
    keep-per-user: 200                  # 每用户最多保留会话数（超出按 update_time 删旧）

# 作业 AI 分析（aiassignment 模块，面向 web-admin 后台）
aiassignment:
  # 上下文最大字符数；超出截断（防 1B 模型首字延迟爆炸）
  max-prompt-chars: 2000
  # 两份 system prompt 也可在 yaml 覆盖，缺省走 AiAssignmentProperties 的 DEFAULT_* 常量
  # class-system-prompt: "..."
  # student-system-prompt: "..."

# knife4j 接口文档
knife4j:
  enable: true
  openapi:
    title: 智能化在线教学支持服务平台管理中心系统接口文档
    version: 1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.smartteach.modules